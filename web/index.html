<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Mart Billing System - Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="auth-wrapper">
<div class="glass-container auth-card">
<div class="brand-header">
<div class="brand-logo">D</div>
<h1 class="brand-title">D-Mart Billing</h1>
<p class="brand-subtitle">Secure Staff Login Portal</p>
</div>

<div id="errorAlert" class="alert alert-danger">Invalid Username or Password</div>
<div id="successAlert" class="alert alert-success">Login successful! Redirecting...</div>

<form id="loginForm">
<div class="form-group">
<label for="userId" class="form-label">User ID (Staff ID)</label>
<input type="text" id="userId" class="form-control" placeholder="Enter your staff ID" required autocomplete="username">
</div>
<div class="form-group">
<label for="password" class="form-label">Password</label>
<input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
</div>
<button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Authenticate</button>
</form>
</div>
</div>

<script src="js/app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
e.preventDefault();
const userId = document.getElementById('userId').value;
const password = document.getElementById('password').value;

const errorAlert = document.getElementById('errorAlert');
const successAlert = document.getElementById('successAlert');
errorAlert.style.display = 'none';
successAlert.style.display = 'none';

try {
const response = await fetch('/api/auth/login', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ userId, password })
});

const result = await response.json();
if (response.ok && result.status === 'success') {
sessionStorage.setItem('userId', result.user.userId);
sessionStorage.setItem('userRole', result.user.role);
sessionStorage.setItem('userName', result.user.name);

successAlert.style.display = 'block';
setTimeout(() => {
if (result.user.role === 'SUPER_ADMIN') {
window.location.href = 'admin.html';
} else {
window.location.href = 'billing.html';
}
}, 1000);
} else {
errorAlert.innerText = result.message || 'Authentication failed';
errorAlert.style.display = 'block';
}
} catch (err) {
errorAlert.innerText = 'Failed to connect to the authentication server.';
errorAlert.style.display = 'block';
console.error(err);
}
});

const currentRole = sessionStorage.getItem('userRole');
if (currentRole === 'SUPER_ADMIN') {
window.location.href = 'admin.html';
} else if (currentRole === 'SUB_ADMIN') {
window.location.href = 'billing.html';
}
</script>
</body>
</html>
